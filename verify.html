<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Cuenta - TicoAuto</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/navbar.js" defer></script>
    <script src="js/verify.js" defer></script>
</head>

<body>
    <div id="navbar"></div>

    <div class="verify-wrapper">

        <div id="loading" class="verify-card">
            <div class="spinner-large"></div>
            <h2>Verificando tu cuenta...</h2>
            <p>Por favor espera un momento.</p>
        </div>

        <div id="success" class="verify-card" style="display:none">
            <div class="verify-icon">✅</div>
            <h2>¡Cuenta verificada!</h2>
            <p>Tu cuenta ha sido activada exitosamente. Ya puedes iniciar sesión.</p>
            <a href="login.html" class="verify-btn">Ir al Login</a>
        </div>

        <div id="error" class="verify-card" style="display:none">
            <div class="verify-icon">❌</div>
            <h2>Error de verificación</h2>
            <p id="errorMsg">El enlace es inválido o ya fue usado.</p>
            <a href="register.html" class="verify-btn verify-btn-secondary">Registrarse nuevamente</a>
        </div>
    </div>

    <footer class="footer">
        <p>TicoAuto © 2026</p>
    </footer>
</body>
</html>
