<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TicoAuto</title>
    <link rel="stylesheet" href="css/styles.css">   
    <script src="js/login.js" defer></script>
    <script src="js/navbar.js" defer></script>
</head>

<body class="login">

    <div id="navbar"></div>

    <h1>Login</h1>

    <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="tu@email" autocomplete="username" required />

        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="********" autocomplete="current-password" required />

        <button type="submit">Iniciar sesión</button>

        <div class="divider"><span>o</span></div>

        <a href="http://localhost:3008/auth/google" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Continuar con Google
        </a>
    </form>

    <form id="twoFAForm" style="display:none">
        <div class="twofa-header">
            <div class="twofa-icon-circle">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.9 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.81 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6.09 6.09l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
            </div>
            <h2>Verificación en dos pasos</h2>
            <p class="twofa-desc">Ingresa el código de 6 dígitos que enviamos a tu teléfono.</p>
        </div>

        <div id="smsBanner" class="sms-banner" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            Código enviado por SMS
        </div>

        <label for="twoFACode">Código de verificación</label>
        <input id="twoFACode" type="text" inputmode="numeric" maxlength="6" placeholder="• • • • • •" autocomplete="one-time-code" class="twofa-input">

        <button type="submit">Verificar</button>

        <p id="twoFAResult" class="twofa-error" style="display:none"></p>
    </form>

    <p id="result"></p>

    <footer class="footer">
        <p>TicoAuto © 2026</p>
    </footer>
</body>
</html>
