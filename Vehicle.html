<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Vehículos - TicoAuto</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/navbar.js" defer></script>
  <script src="js/vehicle.js" defer></script>
</head>

<body class="vehicles">

  <div id="navbar"></div>

  <main class="container">
    <h1>Gestión de Vehículos</h1>

    <div class="card">
      <h2 id="formTitle">Agregar vehículo</h2>
      <form id="vehicleForm" class="vehicle-form">
        <div class="form-group">
          <label for="brand">Marca</label>
          <input type="text" id="brand" required>
        </div>
        <div class="form-group">
          <label for="model">Modelo</label>
          <input type="text" id="model" required>
        </div>
        <div class="form-group">
          <label for="year">Año</label>
          <input type="number" id="year" required min="1900" max="2100">
        </div>
        <div class="form-group">
          <label for="price">Precio</label>
          <input type="number" id="price" required min="0">
        </div>
        <div class="form-group">
          <label for="description">Descripción</label>
          <textarea id="description" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="image">Imagen</label>
          <input type="file" id="image" accept="image/*">
          <img id="previewImage" src="" alt="Preview">        </div>
        <div class="form-actions">
          <button type="submit" id="saveBtn">Guardar vehículo</button>
          <button type="button" id="cancelEdit">Cancelar edición</button>
        </div>
      </form>
    </div>

    <h2 class="section-title">Mis vehículos</h2>
    <div id="vehicleList" class="vehicle-grid"></div>
  </main>

  <footer class="footer">
  <p>TicoAuto © 2026</p>
  </footer>

  <div class="modal-overlay" id="notifModal">
      <div class="modal-box">
          <div class="modal-icon" id="notifIcon"></div>
          <h3 id="notifTitle"></h3>
          <p id="notifMsg"></p>
          <button onclick="cerrarNotif()">Aceptar</button>
      </div>
  </div>

  <div class="modal-overlay" id="confirmModal">
      <div class="modal-box">
          <div class="modal-icon">⚠️</div>
          <h3 id="confirmTitle"></h3>
          <p id="confirmMsg"></p>
          <div style="display:flex; gap:10px; justify-content:center; margin-top:10px">
              <button onclick="confirmAceptar()">Confirmar</button>
              <button onclick="cerrarConfirm()" style="background:#1a1a2e">Cancelar</button>
          </div>
      </div>
  </div>
</body>
</html>
