<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Vehículo - TicoAuto</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/navbar.js" defer></script>
    <script src="js/vehicleDetail.js" defer></script>
</head>

<body class="detail">
    <div id="navbar"></div>

    <button onclick="history.back()">← Volver</button>

    <h1>Detalle del Vehículo</h1>

    <div id="vehicleDetail"></div>
    <button id="shareBtn" onclick="shareVehicle()">🔗 Compartir vehículo</button>

    <h2>Preguntas</h2>
    <div id="questionList"></div>

    <div id="questionSection">
        <input type="text" id="questionInput" placeholder="Haz una pregunta...">
        <button class="ask-btn" onclick="createQuestion()">Preguntar</button>
    </div>
</body>
</html>
