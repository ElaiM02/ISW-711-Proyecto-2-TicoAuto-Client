<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TicoAuto</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/register.js" defer></script>
    <script src="js/navbar.js" defer></script>
</head>

<body class="register">
    <div id="navbar"></div>

    <h1>Registro</h1>

    <form id="registerForm">
        <label for="cedula">Número de Cédula</label>
        <input id="cedula" type="text" maxlength="9" placeholder="123456789" required>

        <label for="name">Nombre</label>
        <input id="name" type="text" readonly placeholder="Se autocompleta con la cédula">

        <label for="email">Email</label>
        <input id="email" type="email">

        <label for="password">Contraseña</label>
        <input id="password" type="password" required>

        <button id="btnRegister" type="submit">Registrarse</button>
    </form>

    <footer class="footer">
        <p>TicoAuto © 2026</p>
    </footer>

    <div class="modal-overlay" id="cedulaModal">
        <div class="modal-box">
            <div id="modalLoading">
                <div class="spinner"></div>
                <h3>Verificando cédula...</h3>
                <p>Por favor espera un momento.</p>
            </div>
            <div id="modalSuccess" style="display:none">
                <div class="modal-icon">✅</div>
                <h3>Cédula verificada</h3>
                <p id="modalName"></p>
                <button onclick="cerrarModal()">Continuar</button>
            </div>
            <div id="modalError" style="display:none">
                <div class="modal-icon">❌</div>
                <h3 id="modalErrorTitle">Cédula no válida</h3>
                <p id="modalErrorMsg">No se encontró en el padrón electoral.</p>
                <button onclick="cerrarModal()">Intentar de nuevo</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-box">
            <div class="modal-icon">✅</div>
            <h3>¡Registro exitoso!</h3>
            <p>Revisa tu correo electrónico para verificar tu cuenta antes de iniciar sesión.</p>
            <button onclick="window.location.href='login.html'">Ir al Login</button>
        </div>
    </div>
</body>
</html>
